# ============================================================
# SignReader — nginx サブドメイン設定
# 配置場所: /etc/nginx/conf.d/signreader.conf
#           または /etc/nginx/sites-available/signreader.conf
#
# 設置後:
#   sudo nginx -t && sudo systemctl reload nginx
# ============================================================

# HTTP → HTTPS リダイレクト
server {
    listen 80;
    server_name api.example.com;   # ← ドメインを変更

    # Let's Encrypt 証明書更新用
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    http2  on;
    server_name api.example.com;   # ← ドメインを変更

    # SSL 証明書（certbot で取得したパス）
    ssl_certificate     /etc/letsencrypt/live/api.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.example.com/privkey.pem;

    # SSL 強化設定
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;

    # セキュリティヘッダー
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Frame-Options           DENY;
    add_header X-Content-Type-Options    nosniff;

    # OCR リクエストはペイロードが大きい（base64 画像）
    client_max_body_size 20M;

    # OCR 処理のタイムアウト延長
    proxy_connect_timeout 10s;
    proxy_read_timeout    120s;
    proxy_send_timeout    120s;

    # SignReader Docker コンテナ（localhost:8000）へプロキシ
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
    }

    # ヘルスチェックエンドポイントはログを記録しない
    location = /health {
        proxy_pass http://127.0.0.1:8000;
        access_log off;
    }
}
