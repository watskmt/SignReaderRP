server {
    listen 80;
    server_name api.signreader.amtech-service.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name api.signreader.amtech-service.com;

    ssl_certificate     /etc/letsencrypt/live/api.signreader.amtech-service.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.signreader.amtech-service.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;

    client_max_body_size 20M;
    proxy_read_timeout  300s;
    proxy_send_timeout  120s;

    # DockerのDNSで10秒ごとに再解決（コンテナ再作成後もIPが追従する）
    resolver 127.0.0.11 valid=10s ipv6=off;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        set $upstream http://api:8000;
        proxy_pass         $upstream;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
