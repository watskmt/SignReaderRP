name: Deploy to WebArena

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT || 22 }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          echo "Key info: lines=$(wc -l < ~/.ssh/id_rsa) bytes=$(wc -c < ~/.ssh/id_rsa)"
          echo "Header: $(head -1 ~/.ssh/id_rsa)"
          openssl rsa -noout -in ~/.ssh/id_rsa 2>&1 \
            || openssl pkey -noout -in ~/.ssh/id_rsa 2>&1 \
            || { echo "openssl validation failed (see above)"; exit 1; }
          echo "SSH key valid"
          ssh-keyscan -p "$SERVER_PORT" "$SERVER_HOST" >> ~/.ssh/known_hosts

      - name: Deploy with deploy.sh
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PORT: ${{ secrets.SERVER_PORT || 22 }}
          DEPLOY_SSH_KEY: /home/runner/.ssh/id_rsa
          PROD_ENV_FILE: ${{ secrets.PROD_ENV_FILE }}
        run: |
          # .env.prod を secrets から復元
          echo "$PROD_ENV_FILE" > backend/.env.prod
          
          # デプロイスクリプトの実行
          chmod +x deploy.sh
          ./deploy.sh deploy
