name: Deploy to WebArena

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          name: id_rsa
          known_hosts: unnecessary
          if_key_exists: replace

      - name: Add known hosts
        run: |
          ssh-keyscan -p ${{ secrets.SERVER_PORT || 22 }} ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy with deploy.sh
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PORT: ${{ secrets.SERVER_PORT || 22 }}
          DEPLOY_SSH_KEY: /home/runner/.ssh/id_rsa
          PROD_ENV_FILE: ${{ secrets.PROD_ENV_FILE }}
        run: |
          # .env.prod を secrets から復元
          echo "$PROD_ENV_FILE" > backend/.env.prod
          
          # デプロイスクリプトの実行
          chmod +x deploy.sh
          ./deploy.sh deploy
