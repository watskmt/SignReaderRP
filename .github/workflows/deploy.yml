name: Deploy to WebArena

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT || 22 }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          python3 - << 'PYEOF'
          import sys
          data = open('/home/runner/.ssh/id_rsa', 'rb').read()
          print(f"bytes={len(data)} lines={data.count(b'\\n')} cr={data.count(b'\\r')}")
          print(f"first_8_hex={data[:8].hex()}")
          print(f"last_4_hex={data[-4:].hex()}")
          print(f"has_bom={data[:3].hex() == 'efbbbf'}")
          # first line without masking sensitive content
          first_line = data.split(b'\\n')[0]
          print(f"first_line_len={len(first_line)}")
          if b'BEGIN' in first_line:
              print(f"first_line={first_line.decode(errors='replace')}")
          else:
              print("first_line=DOES NOT CONTAIN 'BEGIN' - PEM header missing!")
          PYEOF
          openssl rsa -noout -in ~/.ssh/id_rsa 2>&1 \
            || openssl pkey -noout -in ~/.ssh/id_rsa 2>&1 \
            || { echo "Key invalid. Re-generate the key: ssh-keygen -t ed25519 -C deploy -f /tmp/deploy_key -N \"\""; exit 1; }
          echo "SSH key valid"
          ssh-keyscan -p "$SERVER_PORT" "$SERVER_HOST" >> ~/.ssh/known_hosts

      - name: Deploy with deploy.sh
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PORT: ${{ secrets.SERVER_PORT || 22 }}
          DEPLOY_SSH_KEY: /home/runner/.ssh/id_rsa
          PROD_ENV_FILE: ${{ secrets.PROD_ENV_FILE }}
        run: |
          # .env.prod を secrets から復元
          echo "$PROD_ENV_FILE" > backend/.env.prod
          
          # デプロイスクリプトの実行
          chmod +x deploy.sh
          ./deploy.sh deploy
