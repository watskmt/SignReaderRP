name: Deploy to WebArena

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          # 秘密鍵を書き出し、改行コードを LF に統一し、末尾に確実に改行を追加
          # もし Base64 で保存されている場合を考慮して、-----BEGIN がなければ base64 デコードを試みる
          echo "$SSH_KEY" | tr -d '\r' > ~/.ssh/webarena.tmp
          if ! grep -q "BEGIN " ~/.ssh/webarena.tmp; then
            echo "Debug: PEM header not found, attempting base64 decode"
            if base64 -d ~/.ssh/webarena.tmp > ~/.ssh/webarena 2>/dev/null; then
              echo "Debug: Base64 decode successful"
            else
              echo "Debug: Base64 decode failed, using original"
              mv ~/.ssh/webarena.tmp ~/.ssh/webarena
            fi
          else
            mv ~/.ssh/webarena.tmp ~/.ssh/webarena
          fi
          
          # 末尾に改行を保証
          echo "" >> ~/.ssh/webarena

          chmod 600 ~/.ssh/webarena
          ssh-keyscan -p ${{ secrets.SERVER_PORT || 22 }} ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy with deploy.sh
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PORT: ${{ secrets.SERVER_PORT || 22 }}
          DEPLOY_SSH_KEY: /home/runner/.ssh/webarena
          PROD_ENV_FILE: ${{ secrets.PROD_ENV_FILE }}
        run: |
          # .env.prod を secrets から復元
          echo "$PROD_ENV_FILE" > backend/.env.prod
          
          # デプロイスクリプトの実行
          chmod +x deploy.sh
          ./deploy.sh deploy
